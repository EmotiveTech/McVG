       // --- FAZBEAR TAB RENAMER V3.0 (AUTO-GRABBER) ---

(function() {
    // 1. SETUP HTML FOR THE MENU
    const html = `

        display: none;

        <label style="font-size: 0.8rem; color: #888;">QUICK SELECT:</label><br>
        <select id="cloak-preset" style="width: 95%; margin-bottom: 15px; padding: 5px; background: #222; color: #fff; border: 1px solid #444;">
            <option value="">-- Choose a Disguise --</option>
            <option value="Google Drive|https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">Google Drive</option>
            <option value="Google Classroom|https://ssl.gstatic.com/classroom/favicon.png">Google Classroom</option>
            <option value="Google Docs|https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">Google Docs</option>
            <option value="My Drive - Google Drive|https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">My Drive</option>

            <option value="Wikipedia|https://en.wikipedia.org/static/favicon/wikipedia.ico">Wikipedia</option>
            <option value="Canvas|https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico">Canvas</option>
            <option value="Schoology|https://ui.schoology.com/design-system/assets/favicon-d123.ico">Schoology</option>
        </select>
        
        <hr style="border-color: #333; margin: 10px 0;">

        <label style="font-size: 0.8rem;">TAB TITLE:</label><br>
        <input type="text" id="cloak-title" placeholder="e.g. Math Notes" style="width: 90%; margin-bottom: 10px; padding: 5px; background: #000; color: #fff; border: 1px solid #333;"><br>
        
        <label style="font-size: 0.8rem;">WEBSITE ICON GRABBER:</label><br>
        <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 15px;">
            <input type="text" id="cloak-domain" placeholder="e.g. roblox.com" style="width: 60%; padding: 5px; background: #000; color: #fff; border: 1px solid #333;">

        </div>

        <input type="hidden" id="cloak-icon-url">
        
        <div style="margin-bottom: 15px;">
            <img id="icon-preview" src="" style="width: 32px; height: 32px; display: none; border: 1px solid #555;">
        </div>
        
        <button id="btn-cloak" style="background: #b30000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;">APPLY</button>
        <button id="btn-reset-cloak" style="background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-left: 5px;">RESET</button>
        
        <div style="margin-top: 10px; font-size: 0.7rem; color: #666;">Press Alt + R to Open / ESC to Close</div>
    </div>
    `;

    // Add to body
    const div = document.createElement('div');
    div.innerHTML = html;
    document.body.appendChild(div);

    // --- VARIABLES ---
    const menu = document.getElementById('cloaker-menu');
    const inputTitle = document.getElementById('cloak-title');
    const inputDomain = document.getElementById('cloak-domain');
    const inputIconUrl = document.getElementById('cloak-icon-url');
    const selectPreset = document.getElementById('cloak-preset');
    const imgPreview = document.getElementById('icon-preview');
    
    const btnGrab = document.getElementById('btn-grab');
    const btnApply = document.getElementById('btn-cloak');
    const btnReset = document.getElementById('btn-reset-cloak');

    // --- FUNCTIONS ---

    function setFavicon(url) {
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            document.getElementsByTagName('head')[0].appendChild(link);
        }
        link.href = url;
    }

    function loadSettings() {
        const savedTitle = localStorage.getItem('faz_cloak_title');
        const savedIcon = localStorage.getItem('faz_cloak_icon');

        if (savedTitle) {
            document.title = savedTitle;
            inputTitle.value = savedTitle;
        }

        if (savedIcon) {
            setFavicon(savedIcon);
            inputIconUrl.value = savedIcon;
            showPreview(savedIcon);
        }
    }

    function showPreview(url) {
        imgPreview.src = url;
        imgPreview.style.display = 'inline-block';
    }

    // 1. PRESET HANDLER
    selectPreset.addEventListener('change', function() {
        const val = this.value;
        if(!val) return;
        
        const parts = val.split('|'); // Split "Name|URL"
        inputTitle.value = parts[0];
        inputIconUrl.value = parts[1];
        showPreview(parts[1]);
    });

    // 2. DOMAIN GRABBER HANDLER
    btnGrab.addEventListener('click', function() {
        const domain = inputDomain.value.trim();
        if(!domain) return;

        // Use Google's S2 Service to fetch favicon
        const iconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        
        inputIconUrl.value = iconUrl;
        showPreview(iconUrl);
    });

    // 3. APPLY SETTINGS
    function applyCloak() {
        const t = inputTitle.value;
        const i = inputIconUrl.value;

        if (t) {
            document.title = t;
            localStorage.setItem('faz_cloak_title', t);
        }
        
        if (i) {
            setFavicon(i);
            localStorage.setItem('faz_cloak_icon', i);
        }

        menu.style.display = 'none';
    }

    // 4. RESET
    function resetCloak() {
        localStorage.removeItem('faz_cloak_title');
        localStorage.removeItem('faz_cloak_icon');
        location.reload(); 
    }

    // --- KEY LISTENERS ---
    document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key.toLowerCase() === 'r') {
            e.preventDefault();
            menu.style.display = 'block';
        }
        if (e.key === 'Escape') {
            menu.style.display = 'none';
        }
    });

    btnApply.addEventListener('click', applyCloak);
    btnReset.addEventListener('click', resetCloak);

    // Load on start
    loadSettings();

})();

      };

    <!-- ZONETAG - PLACE INTO HEAD SECTION OR RUN CODE AT STARTUP -->
    <script>
      (function (zonefile) {
        var y = window.location.href
          .split("#")[0]
          .split("")
          .reduce(function (a, b) {
            return ((a << 5) - a + b.charCodeAt(0)) >>> 1;
          }, 0);
        y = (10 + ((y * 7) % 26)).toString(36) + y.toString(36);
        var drutObj = (window[y] = window[y] || {});
        function failCpmstarAPI() {
          var failFn = function (o) {
            o && typeof o === "object" && o.fail && o.fail();
          };
          drutObj &&
            Array.isArray(drutObj.cmd) &&
            drutObj.cmd.forEach(failFn) &&
            (drutObj.cmd.length = 0);
          window.cpmstarAPI = window["_" + zonefile] = failFn;
        }
        var rnd = Math.round(Math.random() * 999999);
        var s = document.createElement("script");
        s.type = "text/javascript";
        s.async = true;
        s.onerror = failCpmstarAPI;
        var proto = document.location.protocol;
        var host =
          proto == "https:" || proto == "file:" ? "https://server" : "//cdn";
        if (window.location.hash == "#cpmstarDev") host = "//dev.server";
        if (window.location.hash == "#cpmstarStaging")
          host = "//staging.server";
        s.src =
          host + ".cpmstar.com/cached/zonefiles/" + zonefile + ".js?rnd=" + rnd;
        var s2 = document.getElementsByTagName("script")[0];
        s2.parentNode.insertBefore(s, s2);
        window.cpmstarAPI = function (o) {
          (drutObj.cmd = drutObj.cmd || []).push(o);
        };
      })("372_49986_1v1");
      Object.defineProperty(
        window.performance.__proto__,
        "measures",
        Object.getOwnPropertyDescriptor(window.performance.__proto__, "now")
      ),
        delete window.performance.__proto__.now,
        (window.performance.__proto__.now = {}),
        Object.defineProperty(window.performance.__proto__, "now", {
          get: function () {
            return this.measures;
          },
        }),
        Object.defineProperty(window.performance.__proto__, "now", {
          set: function () {
            Object.defineProperty(window.performance.__proto__, "now", {
              get: function () {
                return function () {
                  return this.measures() / 2;
                };
              },
            });
          },
        });
    </script>

        <!-- 300X250B PLACEMENT TAG - PLACE INTO BODY (ZONE TAG REQUIRED) -->
        <script>
          (function (w, pid) {
            var r = function (c, m) {
                c = c.split("").reduce(function (a, b) {
                  return ((a << 5) - a + b.charCodeAt(0)) >>> m;
                }, 0);
                return (10 + ((c * 7) % 26)).toString(36) + c.toString(36);
              },

              '<div style="width:300px;height:250px" class="' + c + '"></div>'
            );

    <script id="unity-loader" src="UnityLoader.js"></script>
    <!--<script src="Build/UnityLoader.js"></script>-->
    <script>
      var gameJsonUrl =
        "https://justbuild.nyc3.cdn.digitaloceanspaces.com/CI/1v1/Prod/162/WebGL.json"; //%gameJsonUrl
      var hostname = window.location.hostname;
      if (
        hostname.indexOf("dev1v1") >= 0 ||
        hostname.indexOf("dev.1v1") >= 0 ||
        hostname.indexOf("test1v1") >= 0 ||
        hostname.indexOf("test.1v1") >= 0
      ) {
        let urlParams = new URLSearchParams(window.location.search);
        let queryParam = urlParams.get("version");

        if (queryParam !== undefined && queryParam !== null) {
          gameJsonUrl = gameJsonUrl.replace(/[0-9][0-9]+/i, queryParam);
        }
      }
      var gameInstance = UnityLoader.instantiate("gameContainer", gameJsonUrl, {
        onProgress: UnityProgress,
      });
      //var gameInstance = UnityLoader.instantiate("gameContainer", "Build/WebGL.json", {onProgress: UnityProgress});

      window.unityInstance = gameInstance;
      var lockedOccured = false;

      function UnityProgress(gameInstance, progress) {
        if (!gameInstance.Module) {
          return;
        }
        const loader = document.querySelector("#loader");
        if (!gameInstance.progress) {
          const progress = document.querySelector("#loader .progress");
          progress.style.display = "block";
          gameInstance.progress = progress.querySelector(".full");
          loader.querySelector(".spinner").style.display = "none";
        }
        gameInstance.progress.style.transform = `scaleX(${progress})`;
        if (progress === 1 && !gameInstance.removeTimeout) {
          loader.style.display = "none";
          gameLoaded = true;
        }
      }

      document.onkeydown = function (e) {
        if (
          e.altKey ||
          e.ctrlKey ||
          e.key == "F1" ||
          e.key == "F2" ||
          e.key == "F3" ||
          e.key == "F4"
        ) {
          e.preventDefault();
        }
      };

      document.onmouseup = function (e) {
        e.preventDefault();
      };

      document.addEventListener("pointerlockchange", lockChangeAlert, false);
      document.addEventListener("mozpointerlockchange", lockChangeAlert, false);

      function lockChangeAlert() {
        if (!lockedOccured && document.pointerLockElement) lockedOccured = true;
        if (!document.pointerLockElement && lockedOccured) {
          lockedOccured = false;
          gameInstance.SendMessage("Pause Menu", "OnCursorUnlocked");
        }
      }

      window.addEventListener("resize", injectAdByWindowSize);

      function injectAdByWindowSize() {
        // Inject small ad if screen is small, or large ad if screen is large
        if (window.innerHeight < 900) {
          if (document.getElementById("adRectangleBottom") == null) {
            var el = document.getElementsByClassName("ad-rectangle-bottom")[0];
            el.id = "adRectangleBottom";
            cpmstarAPI({
              kind: "go",
              module: "POOL 83025",
              config: { conditions: { target: { el: el, kind: "replace" } } },
            });
          }
        } else {
          if (document.getElementById("adLeaderboardBottom") == null) {
            var el = document.getElementsByClassName(
              "ad-leaderboard-bottom"
            )[0];
            el.id = "adLeaderboardBottom";
            cpmstarAPI({
              kind: "go",
              module: "POOL 85420",
              config: { conditions: { target: { el: el, kind: "replace" } } },
            });
          }
        }
      }

      injectAdByWindowSize();

      var refreshNextTime = true;

      function showAds() {
        document.getElementsByClassName(
          "ad-rectangle-bottom"
        )[0].style.display = "block";
        document.getElementsByClassName(
          "ad-leaderboard-bottom"
        )[0].style.display = "block";
        document.getElementById("adRectangleUpper").style.display = "block";

        if (typeof counter === "undefined") {
          startCounter();
          resumeCounter();
        } else {
          resumeCounter();
          refresh();
        }
      }

      function hideAds() {
        document.getElementsByClassName(
          "ad-rectangle-bottom"
        )[0].style.display = "none";
        document.getElementsByClassName(
          "ad-leaderboard-bottom"
        )[0].style.display = "none";
        document.getElementById("adRectangleUpper").style.display = "none";

        pauseCounter();
      }

      // hide ads
      hideAds();

      function refresh() {
        //console.log("time since ads refresh = " + timeSinceRefresh + " seconds");
        //console.log("time ads visible = " + timeAdsVisible + " seconds");

        if (timeSinceRefresh <= 30 || timeAdsVisible <= 2) {
          //console.log("don't refresh");
          return;
        }

        if (
          document.getElementById("adRectangleBottom") != null &&
          window.getComputedStyle(
            document.getElementsByClassName("ad-smallscreen")[0]
          ).display != "none"
        ) {
          cpmstarAPI({
            kind: "adcmd",
            module: "POOL 83023",
            command: "refresh",
          });
        }

        if (
          document.getElementById("adLeaderboardBottom") != null &&
          window.getComputedStyle(
            document.getElementsByClassName("ad-largescreen")[0]
          ).display != "none"
        ) {
          cpmstarAPI({
            kind: "adcmd",
            module: "POOL 85420",
            command: "refresh",
          });
        }

        cpmstarAPI({ kind: "adcmd", module: "POOL 83025", command: "refresh" });

        timeSinceRefresh = 0;
        timeAdsVisible = 0;
        //console.log("refresh ads");
      }

      window.onfocus = function () {
        //console.log("onfocus");
        resumeCounter();
        refresh();
      };

      window.onblur = function () {
        //console.log("onblur");
        pauseCounter();
      };

      var timeSinceRefresh = 0;
      var timeAdsVisible = 0;
      var counter;
      var adsVisible = false;

      function startCounter() {
        timeSinceRefresh++;
        if (adsVisible) timeAdsVisible++;

        counter = setTimeout(function () {
          startCounter();
        }, 1000);
      }

      function resumeCounter() {
        adsVisible = true;
      }

      function pauseCounter() {
        adsVisible = false;
      }
    </script>
